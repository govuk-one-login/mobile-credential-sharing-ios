name: iOS Pull Request

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]

concurrency:
  group: pr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linting-workflow:
    name: "Linting"
    uses: ./.github/workflows/linting.yml
    secrets: inherit

  testing-workflow:
    name: "Testing"
    if: github.event.pull_request.draft == false
    uses: ./.github/workflows/testing.yml
    secrets: inherit

  sonar-scan:
    name: SonarCloud PR scan
    needs: [ testing-workflow ]
    runs-on: macos-26
    timeout-minutes: 28
    steps:
      - name: Add "/usr/local/bin" to PATH
        run: echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: 'true'
          fetch-depth: 0

      - name: Setup Homebrew
        uses: ./.github/actions/homebrew-dependencies

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically

      - name: Download test coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          pattern: "*-test-coverage"
          merge-multiple: true

      - name: Perform sonar scan via fastlane
        run: |
          ./scripts/sonar/pr-scan
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8
          PR_NUMBER: ${{ github.event.number }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          WORKSPACE: ${{ github.workspace }}

      # Check the Quality Gate status.
      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # pin@v1.2.0
        # Force to fail step after specific time.
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
