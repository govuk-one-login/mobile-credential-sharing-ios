name: iOS Quality Report

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RUBY_VERSION: "3.3.0"

jobs:
  linting-workflow:
    name: "Linting (main)"
    uses: ./.github/workflows/linting.yml
    secrets: inherit

  testing-workflow:
    name: "Testing (main)"
    uses: ./.github/workflows/testing.yml
    secrets: inherit
    with:
      ruby-version: ${RUBY_VERSION}

  sonar-scan:
    name: "SonarCloud scan (main)"
    needs: [ testing-workflow ]
    runs-on: macos-26
    timeout-minutes: 28
    steps:
      - name: Add "/usr/local/bin" to PATH
        run: echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: 'true'
          fetch-depth: 0

      - name: Setup Homebrew
        uses: ./.github/actions/homebrew-dependencies

      - name: Setup Ruby toolchain
        uses: ./.github/actions/setup-ruby
        with:
          version: ${RUBY_VERSION}

      - name: Download test coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          pattern: "*-test-coverage"
          merge-multiple: true

      - name: Perform sonar scan via fastlane
        run: |
          ./scripts/sonar/branch-scan
        shell: bash
        env:
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          WORKSPACE: ${{ github.workspace }}
