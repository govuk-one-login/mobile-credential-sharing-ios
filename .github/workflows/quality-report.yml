name: iOS Quality Report

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  linting-workflow:
    name: "Linting (main)"
    uses: ./.github/workflows/linting.yml
    secrets: inherit

  testing-workflow:
    name: "Testing (main)"
    uses: ./.github/workflows/testing.yml
    secrets: inherit

  sonar-scan:
    name: "SonarCloud scan (main)"
    needs: [ testing-workflow ]
    runs-on: macos-26
    timeout-minutes: 28
    steps:
      - name: Add "/usr/local/bin" to PATH
        run: echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: 'true'
          fetch-depth: 0

      - name: Setup Homebrew
        uses: ./.github/actions/homebrew-dependencies

      - name: Setup Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically

      - name: Download test coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          pattern: "*-test-coverage"
          merge-multiple: true

      - name: Perform sonar scan via fastlane
        run: |
          ./scripts/sonar/branch-scan
        shell: bash
        env:
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          WORKSPACE: ${{ github.workspace }}
