# Workflow for running all test suites.
# Also performs SonarCloud scanning.

name: Test suites

on:
  workflow_call:
    inputs:
      pr-number:
        type: string
        required: true
        description: "The current GitHub PR number."
      ruby-version:
        type: string
        required: true
        description: "The version of Ruby to use for this workflow"
        default: "3.2.2"
    secrets:
      SONAR_TOKEN:
        required: true
        description: "The SonarCloud API token to authenticate with."

concurrency:
  group: testing-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-test:
    name: Contract tests
    secrets: inherit
    uses: ./.github/workflows/test-suite.yml
    with:
      pr-number: ${{ inputs.pr-number }}
      ruby-version: ${{ inputs.ruby-version }}
      test-plan: ContractTestPlan

  simulator-test:
    name: Simulator tests
    secrets: inherit
    uses: ./.github/workflows/test-suite.yml
    with:
      pr-number: ${{ inputs.pr-number }}
      ruby-version: ${{ inputs.ruby-version }}
      test-plan: SimulatorTestPlan

  unit-test:
    name: Unit tests
    secrets: inherit
    uses: ./.github/workflows/test-suite.yml
    with:
      pr-number: ${{ inputs.pr-number }}
      ruby-version: ${{ inputs.ruby-version }}
      test-plan: UnitTestPlan

  sonar-scan:
    name: SonarCloud scan
    needs: [contract-test, simulator-test, unit-test]
    runs-on: macos-26
    timeout-minutes: 28
    steps:
      - name: Add "/usr/local/bin" to PATH
        run: echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: 'true'
          fetch-depth: 0

      - name: Setup Homebrew
        uses: .github/actions/homebrew-dependencies

      - name: Setup Ruby toolchain
        uses: .github/actions/setup-ruby
        with:
          version: ${{ inputs.ruby-version }}

      - name: Download test coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          artifact-ids: ${{ needs.contract-test.outputs.artifact-id }},${{ needs.simulator-test.outputs.artifact-id }},${{ needs.unit-test.outputs.artifact-id }}

      # Check the Quality Gate status.
      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # pin@v1.2.0
        # Force to fail step after specific time.
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
