# Workflow to run a single test suite, decided via the 'test-plan' input
# Provides `artifact-id` as an output, for use in downloading outside of this workflow.

name: Build

on:
  workflow_call:

concurrency:
  group: test-build-${{ inputs.test-plan }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-app:
    name: Build app
    runs-on: macos-26
    timeout-minutes: 28

    steps:
      - name: Add "/usr/local/bin" to PATH
        run: echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: 'true'
          fetch-depth: 0

      - name: Setup Homebrew
        uses: ./.github/actions/homebrew-dependencies

      - name: Setup Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically

      - name: Restore cached Derived data
        id: restore-cached-derived-data
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-deriveddata-${{ hashFiles('**/*.xcodeproj/project.pbxproj', '**/*.xcworkspace/contents.xcworkspacedata') }}
          restore-keys: |
            ${{ runner.os }}-xcode-deriveddata-

      - name: Restore cached Swift Package Manager
        id: restore-cached-swift-packages
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build app without running tests
        env:
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8
          WORKSPACE: ${{ github.workspace }}
          TEST_PLAN: ${{ inputs.test-plan }}
        run: |
          ./scripts/build-without-testing
        shell: bash

      - name: Clean derived data cache intermediates
        run: |
          # Remove large intermediate files
          rm -rf ~/Library/Developer/Xcode/DerivedData/*/Build/Intermediates.noindex
        shell: bash

      - name: Cache Derived data
        id: cache-derived-data
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ steps.restore-cached-derived-data.outputs.cache-primary-key }}

      - name: Cache Swift Package Manager
        id: cache-swift-packages
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: ${{ steps.restore-cached-swift-packages.outputs.cache-primary-key }}
